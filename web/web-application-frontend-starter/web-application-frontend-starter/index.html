<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrientMarket</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<header class="header_section">
    <div class="container">
        <nav class="navbar navbar-expand-lg custom_nav-container">





            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span></span>
            </button>

            <a href="#" class="brand-logo d-flex align-items-center">
                <img src="assets/img/logo.png" alt="OrientMarket" class="logo-img">
                <span class="logo-text">OrientMarket</span>
            </a>

            <button class="btn btn-outline-dark ms-2" onclick="navigateTo('orders')">
                Orders
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">

                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-route="home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-route="products">Products</a>
                    </li>
                </ul>

                <!--  USER OPTIONS -->
                <div class="user_option d-flex align-items-center gap-3">

                    <button id="analyticsBtn"
                            class="btn btn-outline-primary btn-sm"
                            onclick="navigateTo('analytics')"
                            style="display: none;">
                        Analytics
                    </button>



                    <button class="btn btn-outline-dark btn-sm"
                            onclick="navigateTo('cart')">
                         Cart (<span id="cart-count">0</span>)
                    </button>


                </div>

            </div>
        </nav>
    </div>
</header>

<!-- APP -->
<div class="container mt-4">
    <div id="app-container">
        <div class="text-center">
            <div class="spinner-border"></div>

        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="mt-5 py-3 bg-light text-center">
    <p>Food Wholesale Platform</p>
</footer>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/api.js"></script>
<script src="js/pages/home.js"></script>
<script src="js/pages/list.js"></script>
<script src="js/pages/details.js"></script>
<script src="js/pages/edit.js"></script>
<script src="js/pages/analytics.js"></script>
<script src="js/pages/cart.js"></script>
<script src="js/pages/orders.js"></script>
<script src="js/pages/admin.js"></script>
<script src="js/app.js"></script>



</body>
</html>
